<!--
  EmailJS → Email Templates → Content (coller tel quel).
  Subject suggéré : Nouvelle demande — {{intent_label}} · {{name}}

  Variables : name, time, intent_label, intent_id, reply_to, company, message
-->
<div style="font-family: system-ui, sans-serif, Arial; font-size: 12px; color: #1e293b">
  <div style="margin-bottom: 8px">
    Nouvelle demande via le portfolio —
    <strong style="color: #312e81">{{intent_label}}</strong>
  </div>
  <div style="font-size: 11px; color: #64748b; margin-bottom: 16px">
    Réf. {{intent_id}} · {{time}}
  </div>

  <div
    style="
      margin-top: 8px;
      padding: 15px 0;
      border-width: 1px 0;
      border-style: dashed;
      border-color: #cbd5e1;
    "
  >
    <table role="presentation" cellpadding="0" cellspacing="0" style="width: 100%">
      <tr>
        <td style="vertical-align: top; width: 48px">
          <div
            style="
              padding: 6px 10px;
              background-color: #eef2ff;
              border-radius: 5px;
              font-size: 26px;
              text-align: center;
            "
            role="img"
          >
            👤
          </div>
        </td>
        <td style="vertical-align: top; padding-left: 4px">
          <div style="color: #1e293b; font-size: 16px; line-height: 1.4">
            <strong>{{name}}</strong>
          </div>
          <div style="color: #64748b; font-size: 13px; margin-top: 2px">
            <a href="mailto:{{reply_to}}" style="color: #4f46e5; text-decoration: none">{{reply_to}}</a>
          </div>
          <div style="color: #94a3b8; font-size: 12px; margin-top: 4px">{{time}}</div>
          <div
            style="
              margin-top: 12px;
              padding: 10px 12px;
              background-color: #f8fafc;
              border-radius: 6px;
              font-size: 13px;
              color: #475569;
            "
          >
            <strong>Entreprise / projet :</strong> {{company}}
          </div>
          <p style="font-size: 15px; line-height: 1.55; margin: 14px 0 0; color: #334155">{{message}}</p>
        </td>
      </tr>
    </table>
  </div>
</div>
